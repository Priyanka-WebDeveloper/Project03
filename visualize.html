<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Blockchain Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    background: radial-gradient(circle at top, #020617, #000);
    color: #00ffff;
    font-family: Segoe UI, sans-serif;
    padding: 30px;
    text-align: center;
}

h1 {
    font-size: 32px;
    text-shadow: 0 0 20px cyan;
    margin-bottom: 20px;
}

.status {
    font-size: 20px;
    margin-bottom: 30px;
}

.stats-container {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.stat-card {
    background: rgba(0,255,255,0.05);
    border: 1px solid cyan;
    border-radius: 12px;
    padding: 25px 50px;
    box-shadow: 0 0 20px #00ffff33;
    transition: 0.3s;
}

.stat-card:hover {
    box-shadow: 0 0 30px cyan;
    transform: translateY(-5px);
}

.stat-card h2 {
    font-size: 42px;
    color: #00ffff;
    text-shadow: 0 0 10px cyan;
}

canvas {
    background: rgba(0,0,0,0.6);
    border: 1px solid cyan;
    border-radius: 12px;
    padding: 20px;
    margin-top: 30px;
    box-shadow: 0 0 20px #00ffff33;
}

a {
    display: inline-block;
    margin-top: 40px;
    color: cyan;
    text-decoration: none;
    border: 1px solid cyan;
    padding: 10px 20px;
    border-radius: 8px;
    transition: 0.3s;
}

a:hover {
    background: cyan;
    color: black;
    box-shadow: 0 0 15px cyan;
}

</style>
</head>

<body>

<h1>⚡ Neon Blockchain Dashboard ⚡</h1>

<div class="status">
Blockchain Status:
{% if is_valid %}
<span style="color:#22c55e;">✅ Valid</span>
{% else %}
<span style="color:#ef4444;">❌ Tampered</span>
{% endif %}
</div>

<div class="stats-container">
<div class="stat-card">
<h2 id="totalBlocks">0</h2>
<p>Total Blocks</p>
</div>

<div class="stat-card">
<h2 id="uniqueHabits">0</h2>
<p>Unique Habits</p>
</div>
</div>

<h2>📊 Habit Frequency</h2>
<canvas id="habitChart"></canvas>

<h2>📈 Blockchain Growth</h2>
<canvas id="growthChart"></canvas>

<a href="/">🏠 Back to Home</a>

<script id="chain-data" type="application/json">
{{ chain | tojson }}
</script>

<script>

const chain = JSON.parse(
document.getElementById("chain-data").textContent
);

const realBlocks = chain.filter(
block => block.data !== "Genesis Block"
);

document.getElementById("totalBlocks").innerText =
realBlocks.length;

const habitCounts = {};

realBlocks.forEach(block => {
habitCounts[block.data] =
(habitCounts[block.data] || 0) + 1;
});

document.getElementById("uniqueHabits").innerText =
Object.keys(habitCounts).length;

if (realBlocks.length > 0) {

new Chart(document.getElementById("habitChart"), {
type: "bar",
data: {
labels: Object.keys(habitCounts),
datasets: [{
label: "Habit Frequency",
data: Object.values(habitCounts),
backgroundColor: "rgba(0,255,255,0.6)"
}]
},
options: { responsive: true }
});

new Chart(document.getElementById("growthChart"), {
type: "line",
data: {
labels: realBlocks.map((_, i) => "Block " + (i + 1)),
datasets: [{
label: "Blockchain Growth",
data: realBlocks.map((_, i) => i + 1),
borderColor: "#00ffff",
backgroundColor: "rgba(0,255,255,0.2)",
fill: true
}]
},
options: { responsive: true }
});

}

</script>

</body>
</html>
