  m  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Habit - Blockchain Habit Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin-top: 100px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #00ffea;
            text-shadow: 2px 2px 8px #000;
        }

        .form-label {
            font-weight: 500;
            color: #d1d1d1;
        }

        .form-control {
            border-radius: 50px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 8px #00ffea;
            color: #fff;
        }

        .btn-success {
            width: 100%;
            font-size: 1.2rem;
            padding: 12px;
            border-radius: 50px;
            background: linear-gradient(45deg, #00ff7f, #00bfff);
            border: none;
            transition: all 0.3s ease;
            box-shadow: 0 6px 18px rgba(0,0,0,0.4);
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}
    <div class="container">
        <div class="card">
            <h2><i class="fa-solid fa-plus"></i> Add New Habit</h2>
            <form action="{{ url_for('add_habit') }}" method="POST">
                <div class="mb-3">
                    <label for="habit" class="form-label">Habit Name</label>
                    <input type="text" class="form-control" id="habit" name="habit" placeholder="Enter habit" required>
                </div>
                <button type="submit" class="btn btn-success"><i class="fa-solid fa-check"></i> Add Habit</button>
            </form>
        </div>
    </div>
</body>
</html>
